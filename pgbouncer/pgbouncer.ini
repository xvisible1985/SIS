[databases]
sis = host=timescaledb port=5432 dbname=sis user=sis password=sis_secret

[pgbouncer]
listen_addr = *
listen_port = 5432
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt

; Transaction mode: одно физическое соединение с БД используется несколькими клиентами
; поочерёдно в рамках транзакций. Максимальная эффективность пула.
pool_mode = transaction

; Максимум клиентских подключений (4 сервиса × 40 pool + запас)
max_client_conn = 300

; Реальных соединений к PostgreSQL — хватит для текущей нагрузки
default_pool_size = 20
min_pool_size = 5

; Резервные соединения для пиков нагрузки
reserve_pool_size = 5
reserve_pool_timeout = 3

; Сброс состояния соединения после возврата в пул
server_reset_query = DISCARD ALL
server_check_delay = 30
server_check_query = select 1

; pgx отправляет этот параметр при подключении — pgBouncer должен его игнорировать
ignore_startup_parameters = extra_float_digits

log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

admin_users = sis
