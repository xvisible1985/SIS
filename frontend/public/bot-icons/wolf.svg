<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="moon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#06060e"/>
  <!-- moon -->
  <circle cx="50" cy="12" r="8" fill="url(#moon)" opacity=".85"/>
  <circle cx="54" cy="9" r="7" fill="#06060e"/>
  <!-- ears -->
  <polygon points="18,24 12,8 26,18" fill="url(#g)"/>
  <polygon points="46,24 52,8 38,18" fill="url(#g)"/>
  <polygon points="18,24 14,12 24,18" fill="#d1d5db"/>
  <polygon points="46,24 50,12 40,18" fill="#d1d5db"/>
  <!-- head -->
  <ellipse cx="32" cy="36" rx="19" ry="18" fill="url(#g)"/>
  <!-- face markings -->
  <ellipse cx="32" cy="42" rx="12" ry="9" fill="#d1d5db"/>
  <!-- snout -->
  <ellipse cx="32" cy="44" rx="8" ry="6" fill="#e5e7eb"/>
  <!-- nose -->
  <ellipse cx="32" cy="41" rx="3.5" ry="2.5" fill="#06060e"/>
  <!-- eyes -->
  <ellipse cx="24" cy="32" rx="4" ry="4.5" fill="#1f2937"/>
  <ellipse cx="40" cy="32" rx="4" ry="4.5" fill="#1f2937"/>
  <!-- iris -->
  <ellipse cx="24" cy="32" rx="2.5" ry="3" fill="#f59e0b"/>
  <ellipse cx="40" cy="32" rx="2.5" ry="3" fill="#f59e0b"/>
  <circle cx="24" cy="32" r="1" fill="#06060e"/>
  <circle cx="40" cy="32" r="1" fill="#06060e"/>
  <circle cx="23" cy="31" r="0.8" fill="#ffffff" opacity=".6"/>
  <circle cx="39" cy="31" r="0.8" fill="#ffffff" opacity=".6"/>
  <!-- mouth -->
  <path d="M27 47 Q32 51 37 47" fill="none" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  <!-- fur texture lines -->
  <path d="M22 28 Q26 24 32 26 Q38 24 42 28" fill="none" stroke="#6b7280" stroke-width="1" opacity=".4"/>
</svg>
