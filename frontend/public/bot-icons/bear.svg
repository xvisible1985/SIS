<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#1a0000"/>
  <!-- ears -->
  <circle cx="18" cy="16" r="8" fill="url(#g)"/>
  <circle cx="46" cy="16" r="8" fill="url(#g)"/>
  <circle cx="18" cy="16" r="4" fill="#7f1d1d"/>
  <circle cx="46" cy="16" r="4" fill="#7f1d1d"/>
  <!-- head -->
  <ellipse cx="32" cy="34" rx="19" ry="17" fill="url(#g)"/>
  <!-- muzzle -->
  <ellipse cx="32" cy="42" rx="10" ry="7" fill="#991b1b"/>
  <!-- nose -->
  <ellipse cx="32" cy="39" rx="4" ry="2.5" fill="#1a0000"/>
  <!-- mouth -->
  <path d="M26 44 Q32 49 38 44" fill="none" stroke="#1a0000" stroke-width="2" stroke-linecap="round"/>
  <!-- eyes -->
  <circle cx="23" cy="30" r="4" fill="#1a0000"/>
  <circle cx="41" cy="30" r="4" fill="#1a0000"/>
  <circle cx="24" cy="29" r="1.5" fill="#f87171"/>
  <circle cx="42" cy="29" r="1.5" fill="#f87171"/>
  <!-- arrow down -->
  <polygon points="32,60 38,50 26,50" fill="#f87171" opacity=".3"/>
</svg>
