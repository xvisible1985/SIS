<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#001a0a"/>
  <!-- snake body -->
  <path d="M10 48 Q12 36 22 36 Q32 36 32 28 Q32 18 42 16 Q52 14 54 22" fill="none" stroke="url(#g)" stroke-width="10" stroke-linecap="round"/>
  <!-- body pattern -->
  <path d="M10 48 Q12 36 22 36 Q32 36 32 28 Q32 18 42 16 Q52 14 54 22" fill="none" stroke="#065f46" stroke-width="4" stroke-linecap="round" stroke-dasharray="6,7" opacity=".6"/>
  <!-- head -->
  <ellipse cx="56" cy="20" rx="8" ry="6" fill="#4ade80" transform="rotate(-20,56,20)"/>
  <!-- eye -->
  <ellipse cx="58" cy="17" rx="2.5" ry="2" fill="#1a0a00" transform="rotate(-20,58,17)"/>
  <circle cx="58.5" cy="16.5" r="0.8" fill="#fde68a" transform="rotate(-20,58.5,16.5)"/>
  <!-- tongue -->
  <path d="M60 23 L62 26 M62 26 L61 28 M62 26 L63 28" fill="none" stroke="#f87171" stroke-width="1.5" stroke-linecap="round" transform="rotate(-20,62,26)"/>
  <!-- coil detail -->
  <path d="M14 50 Q16 44 22 44" fill="none" stroke="#86efac" stroke-width="2" opacity=".3"/>
</svg>
