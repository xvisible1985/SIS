<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#1a1400"/>
  <!-- glow circle -->
  <circle cx="32" cy="32" r="22" fill="#ff9900" opacity=".08"/>
  <!-- bolt -->
  <polygon points="36,8 22,34 31,34 28,56 42,30 33,30" fill="url(#g)" filter="url(#glow)"/>
  <!-- inner highlight -->
  <polygon points="36,14 26,32 32,32 30,48 38,34 34,34" fill="#fffbe0" opacity=".35"/>
</svg>
