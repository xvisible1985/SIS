<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="belly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#030d1a"/>
  <!-- water surface -->
  <path d="M6 36 Q16 32 26 36 Q36 40 46 36 Q54 32 58 36 L58 58 L6 58Z" fill="#0c2a4a" opacity=".6"/>
  <!-- dorsal fin -->
  <path d="M28 22 Q32 8 36 22 Z" fill="url(#g)"/>
  <!-- body -->
  <ellipse cx="32" cy="36" rx="22" ry="12" fill="url(#g)"/>
  <!-- belly -->
  <ellipse cx="32" cy="38" rx="16" ry="8" fill="url(#belly)"/>
  <!-- tail -->
  <path d="M54 36 L62 28 L60 36 L62 44 Z" fill="#475569"/>
  <!-- pectoral fins -->
  <path d="M18 36 L10 44 L22 40 Z" fill="#334155"/>
  <!-- eye -->
  <circle cx="20" cy="32" r="3.5" fill="#1e293b"/>
  <circle cx="20" cy="32" r="2" fill="#334155"/>
  <circle cx="19" cy="31" r="1" fill="#94a3b8" opacity=".5"/>
  <!-- mouth -->
  <path d="M12 38 Q18 44 28 42" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- teeth -->
  <polygon points="14,40 13,43 16,40" fill="#ffffff"/>
  <polygon points="17,41 16,44 19,41" fill="#ffffff"/>
  <polygon points="20,42 19,45 22,42" fill="#ffffff"/>
  <!-- gill slits -->
  <path d="M26 28 Q28 32 26 36" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M30 27 Q32 31 30 35" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
</svg>
