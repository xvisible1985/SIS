<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#100d00"/>
  <!-- outer ring -->
  <circle cx="32" cy="32" r="23" fill="none" stroke="#fbbf24" stroke-width="2" opacity=".4"/>
  <circle cx="32" cy="32" r="22" fill="#1c1600"/>
  <!-- cardinal marks -->
  <text x="30" y="14" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#fbbf24">N</text>
  <text x="30" y="54" font-family="Arial,sans-serif" font-size="7" fill="#78716c">S</text>
  <text x="50" y="35" font-family="Arial,sans-serif" font-size="7" fill="#78716c">E</text>
  <text x="10" y="35" font-family="Arial,sans-serif" font-size="7" fill="#78716c">W</text>
  <!-- tick marks -->
  <line x1="32" y1="11" x2="32" y2="16" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="48" x2="32" y2="53" stroke="#a8a29e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="32" x2="16" y2="32" stroke="#a8a29e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="32" x2="53" y2="32" stroke="#a8a29e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- needle north (gold) -->
  <polygon points="32,16 28,34 32,30 36,34" fill="url(#g)"/>
  <!-- needle south (dark) -->
  <polygon points="32,48 28,30 32,34 36,30" fill="#44403c"/>
  <!-- center -->
  <circle cx="32" cy="32" r="4" fill="#fbbf24"/>
  <circle cx="32" cy="32" r="2" fill="#1c1600"/>
</svg>
