<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="iris" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#164e63"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#020d14"/>
  <!-- outer eye glow -->
  <path d="M8 32 Q32 10 56 32 Q32 54 8 32Z" fill="#0e7490" opacity=".2"/>
  <!-- eye white -->
  <path d="M8 32 Q32 12 56 32 Q32 52 8 32Z" fill="#cffafe"/>
  <!-- iris -->
  <circle cx="32" cy="32" r="12" fill="url(#iris)"/>
  <!-- pupil -->
  <circle cx="32" cy="32" r="6" fill="#020d14"/>
  <!-- highlight -->
  <circle cx="29" cy="28" r="3" fill="#ffffff" opacity=".7"/>
  <circle cx="37" cy="35" r="1.5" fill="#ffffff" opacity=".3"/>
  <!-- eyelid shadow top -->
  <path d="M8 32 Q32 12 56 32" fill="none" stroke="#0e7490" stroke-width="2" opacity=".4"/>
  <!-- outer scan lines -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#22d3ee" stroke-width="0.8" opacity=".2" stroke-dasharray="3,4"/>
</svg>
