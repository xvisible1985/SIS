version: "3.9"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: sis
      POSTGRES_PASSWORD: sis_secret
      POSTGRES_DB: sis
    ports:
      - "5432:5432"
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sis"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_USER: sis
      DB_PASSWORD: sis_secret
      DB_NAME: sis
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 300
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_RESET_QUERY: "DISCARD ALL"
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
      AUTH_TYPE: plain
    ports:
      - "6432:5432"
    depends_on:
      timescaledb:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  tsdb_data:
  redis_data:
